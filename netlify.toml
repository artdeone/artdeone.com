[build]
  command = "node -e \"const fs=require('fs');const key=process.env.FIREBASE_API_KEY||'';let f=fs.readFileSync('js/firebase-config.js','utf8');f=f.replace('__FIREBASE_API_KEY__',key);fs.writeFileSync('js/firebase-config.js',f);console.log('Build: API key replacement done, length:',key.length);\""
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self \"https://8x8.vc\"), camera=(self \"https://8x8.vc\"), display-capture=(self \"https://8x8.vc\"), picture-in-picture=(self \"https://8x8.vc\")"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://cdn.tailwindcss.com
        https://cdnjs.cloudflare.com
        https://unpkg.com
        https://cdn.jsdelivr.net
        https://esm.sh
        https://www.gstatic.com
        https://www.googletagmanager.com
        https://www.google-analytics.com
        https://images.dmca.com
        https://www.tiktok.com
        https://*.tiktokcdn.com
        https://*.ttwstatic.com
        https://*.tiktokv.com
        https://js.puter.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.jitsi.net
        https://*.onet.pl
        https://*.firebaseio.com;
      style-src 'self' 'unsafe-inline'
        https://cdn.tailwindcss.com
        https://cdnjs.cloudflare.com
        https://fonts.googleapis.com
        https://unpkg.com
        https://*.ttwstatic.com
        https://*.tiktokcdn.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.jitsi.net;
      img-src 'self' data: blob:
        https://res.cloudinary.com
        https://*.supabase.co
        https://upload.wikimedia.org
        https://img.youtube.com
        https://i.ytimg.com
        https://images.dmca.com
        https://lh3.googleusercontent.com
        https://*.tiktokcdn.com
        https://*.ttwstatic.com
        https://*.tiktokv.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.onet.pl
        https://*.onetcdn.com
        https://*.gravatar.com;
      font-src 'self' data:
        https://fonts.gstatic.com
        https://cdnjs.cloudflare.com
        https://*.ttwstatic.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.jitsi.net;
      media-src 'self' blob:
        https://res.cloudinary.com
        https://*.tiktokcdn.com
        https://*.tiktokv.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.jitsi.net;
      connect-src 'self'
        https://*.supabase.co
        wss://*.supabase.co
        https://*.googleapis.com
        https://*.firebaseio.com
        wss://*.firebaseio.com
        https://*.firebaseapp.com
        https://firestore.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://www.gstatic.com
        https://www.google-analytics.com
        https://region1.google-analytics.com
        https://unpkg.com
        https://cdn.jsdelivr.net
        https://esm.sh
        https://www.tiktok.com
        https://*.tiktokcdn.com
        https://*.tiktokv.com
        https://*.ttwstatic.com
        https://js.puter.com
        https://*.puter.com
        https://8x8.vc
        https://*.8x8.vc
        wss://8x8.vc
        wss://*.8x8.vc
        https://*.jitsi.net
        wss://*.jitsi.net
        https://*.onet.pl
        wss://*.onet.pl;
      frame-src 'self'
        https://www.youtube.com
        https://www.youtube-nocookie.com
        https://www.tiktok.com
        https://*.tiktokv.com
        https://8x8.vc
        https://*.8x8.vc
        https://*.jitsi.net;
      worker-src 'self' blob:;
      frame-ancestors 'self'"""
